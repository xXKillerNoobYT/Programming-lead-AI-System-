version: "3.8"

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: devlead
      POSTGRES_USER: devlead
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devlead_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mcp-filesystem:
    build: ./mcp/filesystem
    environment:
      - MCP_PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - ollama

  mcp-github:
    build: ./mcp/github
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MCP_PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      - ollama

  mcp-postgres:
    build: ./mcp/postgres
    environment:
      - DATABASE_URL=postgres://devlead:devlead_secret@postgres:5432/devlead
      - MCP_PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      - postgres

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MCP_WS=ws://localhost:3004
    depends_on:
      - ollama
      - mcp-filesystem
      - mcp-github
      - mcp-postgres

volumes:
  ollama:
  postgres_data:
